server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fingerprinted build assets (index-XXXX.js/.css) never change content —
    # cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA entry point: never cache, always revalidate, so a new build shows up
    # immediately on the next load instead of serving a stale index.html that
    # points at old asset hashes.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
