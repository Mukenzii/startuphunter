services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # "Sign up with Google" reads VITE_GOOGLE_CLIENT_ID from frontend/.env
    ports:
      - 3000:3000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn startuphunter.wsgi:application --bind 0.0.0.0:8000
    ports:
      - 8000:8000
    # Share the static volume with nginx so collectstatic output is served.
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      frontend:
        condition: service_started
      db:
        condition: service_healthy
    env_file:
      - ./.env.dev
  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=startuphunterbase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d startuphunterbase"]
      interval: 5s
      timeout: 5s
      retries: 5
  nginx:
    build:
      context: ./nginx
    volumes:
      - static_volume:/home/app/web/staticfiles
    ports:
      - 1337:80
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_volume:
