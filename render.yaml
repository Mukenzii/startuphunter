# Render Blueprint — deploys the Django backend + a managed Postgres database.
# Reuses backend/Dockerfile (which runs migrate + collectstatic on each deploy
# via entrypoint.prod.sh). Deploy: push this file, then on Render click
# New → Blueprint and select this repo.
databases:
  - name: startuphunter-db
    databaseName: startuphunterbase
    user: postgres
    plan: free

services:
  - type: web
    name: startuphunter-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Render's Docker Command overrides the image ENTRYPOINT, so invoke the
    # entrypoint explicitly (runs migrate/collectstatic/superuser, then gunicorn).
    dockerCommand: /entrypoint.sh gunicorn startuphunter.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /admin/login/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      # Space-separated hostnames. The generated *.onrender.com host is added
      # automatically via RENDER_EXTERNAL_HOSTNAME, so leave this minimal.
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost 127.0.0.1"
      # Set this to your Vercel frontend origin so browser API calls are allowed,
      # e.g. https://startuphunter.vercel.app
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      # Google OAuth web client ID (for "Sign up with Google"). Optional.
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Admin superuser, auto-created on first deploy by entrypoint.prod.sh.
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      # Database connection, pulled from the managed Postgres above.
      - key: POSTGRES_DB
        fromDatabase:
          name: startuphunter-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: startuphunter-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: startuphunter-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: startuphunter-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: startuphunter-db
          property: port
